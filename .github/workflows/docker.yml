# This workflow is triggered when semantic-release
# cretes a new tag in the repository.
# A PAT repository secret, SEM_REL_TOKEN, is used to allow
# a new workflow to be triggered, as GITHUB_TOKEN usage does not.

name: post-release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # Push events to matching v*, i.e. v1.0, v20.15.10

#permissions:
#  checks: write

# Only allow one release workflow to execute at a time, since each release
# workflow uses shared resources (git tags, package registries)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            arch: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            arch: linux/arm64
            suffix: arm64
        feature:
          - name: reqwest
            image_suffix: ""
            features: reqwest
          - name: s3
            image_suffix: "-s3"
            features: s3
          - name: reqwest-opentelemetry
            image_suffix: "-opentelemetry"
            features: reqwest,opentelemetry
          - name: s3-opentelemetry
            image_suffix: "-s3-opentelemetry"
            features: s3,opentelemetry
    runs-on: ${{ matrix.platform.runner }}
    name: Build ${{ matrix.feature.name }} (${{ matrix.platform.suffix }})
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push per-arch image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          build-args: DALI_FEATURES=${{ matrix.feature.features }}
          platforms: ${{ matrix.platform.arch }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.feature.image_suffix }}:${{ steps.version.outputs.version }}-${{ matrix.platform.suffix }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    name: Create multi-arch manifests
    strategy:
      matrix:
        feature:
          - name: reqwest
            image_suffix: ""
          - name: s3
            image_suffix: "-s3"
          - name: reqwest-opentelemetry
            image_suffix: "-opentelemetry"
          - name: s3-opentelemetry
            image_suffix: "-s3-opentelemetry"
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          flavor: latest=true
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.feature.image_suffix }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=master,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create and push manifest
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.feature.image_suffix }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Create manifest from per-arch images
          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"

          # Tag additional tags from metadata
          TAGS="${{ steps.meta.outputs.tags }}"
          for TAG in ${TAGS}; do
            if [ "${TAG}" != "${IMAGE}:${VERSION}" ]; then
              docker buildx imagetools create --tag "${TAG}" "${IMAGE}:${VERSION}"
            fi
          done
